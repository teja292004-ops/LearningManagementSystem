<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBloom — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: { 50:'#f5f3ff',100:'#ede9fe',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9' } },
        fontFamily: { sans: ['Inter','sans-serif'] }
      }}
    }
  </script>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 to-indigo-50 flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">

  <!-- Account created success banner (shown after signup) -->
  <div id="success-banner" class="hidden mb-5 bg-green-50 border border-green-200 text-green-700 text-sm rounded-xl px-4 py-3 flex items-center gap-2">
    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Account created! Please sign in to continue.
  </div>

  <div class="text-center mb-8">
    <a href="preview-home.html" class="inline-flex items-center gap-2 mb-4">
      <div class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      </div>
      <span class="font-bold text-2xl text-primary-700">SkillBloom</span>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
    <p class="text-gray-500 text-sm mt-1">Sign in to continue learning</p>
  </div>

  <form class="space-y-4" onsubmit="handleLogin(event)">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input id="email" type="email" placeholder="you@example.com"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <div class="relative">
        <input id="password" type="password" placeholder="Your password"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
        <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
      </div>
    </div>

    <!-- Error -->
    <div id="login-err" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 flex items-center gap-2">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Incorrect email or password. Please try again.
    </div>

    <button type="submit" class="w-full bg-primary-600 text-white font-semibold py-3 rounded-xl hover:bg-primary-700 transition-colors">
      Sign In
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-6">
    Don't have an account?
    <a href="preview-signup.html" class="text-primary-600 font-medium hover:underline">Create one</a>
  </p>
</div>

<script>
// Show success banner if coming from signup
if (localStorage.getItem('sb_just_registered') === '1') {
  document.getElementById('success-banner').classList.remove('hidden');
  localStorage.removeItem('sb_just_registered');
}

function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pwd   = document.getElementById('password').value;
  const err   = document.getElementById('login-err');
  err.classList.add('hidden');

  if (!email || !pwd) { err.classList.remove('hidden'); return; }

  const users = JSON.parse(localStorage.getItem('sb_users') || '[]');
  const user  = users.find(u => u.email === email && u.password === pwd);

  if (user) {
    localStorage.setItem('sb_current_user', JSON.stringify({ name: user.name, email: user.email }));
    window.location.href = 'preview-home.html';
  } else {
    err.classList.remove('hidden');
  }
}
</script>
</body>
</html>
