<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBloom — Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: { 50:'#f5f3ff',100:'#ede9fe',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9' } },
        fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
      }}
    }
  </script>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 to-indigo-50 flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
  <div class="text-center mb-8">
    <a href="preview-home.html" class="inline-flex items-center gap-2 mb-4">
      <div class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      </div>
      <span class="font-bold text-2xl text-primary-700">SkillBloom</span>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Create your account</h1>
    <p class="text-gray-500 text-sm mt-1">Start learning for free today</p>
  </div>

  <form class="space-y-4" onsubmit="handleSignup(event)">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
      <input id="name" type="text" placeholder="Your full name"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
      <p id="name-err" class="text-red-500 text-xs mt-1 hidden">Please enter your full name.</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input id="email" type="email" placeholder="you@example.com"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
      <p id="email-err" class="text-red-500 text-xs mt-1 hidden">Please enter a valid email.</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <div class="relative">
        <input id="password" type="password" placeholder="Min. 8 characters"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
        <button type="button" onclick="var p=document.getElementById('password');p.type=p.type==='password'?'text':'password'" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
      </div>
      <p id="pwd-err" class="text-red-500 text-xs mt-1 hidden">Password must be at least 8 characters.</p>
    </div>

    <button type="submit" class="w-full bg-primary-600 text-white font-semibold py-3 rounded-xl hover:bg-primary-700 transition-colors">
      Create Account
    </button>
  </form>

  <div class="relative my-6">
    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
    <div class="relative flex justify-center text-xs text-gray-400 bg-white px-2">or continue with</div>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <button onclick="window.location='preview-login.html'" class="flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-2.5 text-sm text-gray-600 hover:bg-gray-50">
      <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </button>
    <button onclick="window.location='preview-login.html'" class="flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-2.5 text-sm text-gray-600 hover:bg-gray-50">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </button>
  </div>

  <p class="text-center text-sm text-gray-500 mt-6">
    Already have an account?
    <a href="preview-login.html" class="text-primary-600 font-medium hover:underline">Sign in</a>
  </p>
</div>

<script>
function handleSignup(e) {
  e.preventDefault();
  var name  = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim().toLowerCase();
  var pwd   = document.getElementById('password').value;
  var valid = true;

  document.getElementById('name-err').classList.add('hidden');
  document.getElementById('email-err').classList.add('hidden');
  document.getElementById('pwd-err').classList.add('hidden');

  if (!name)  { document.getElementById('name-err').classList.remove('hidden'); valid = false; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('email-err').classList.remove('hidden'); valid = false; }
  if (pwd.length < 8) { document.getElementById('pwd-err').classList.remove('hidden'); valid = false; }
  if (!valid) return;

  var users = JSON.parse(localStorage.getItem('sb_users') || '[]');
  if (users.find(function(u){ return u.email === email; })) {
    var err = document.getElementById('email-err');
    err.textContent = 'An account with this email already exists.';
    err.classList.remove('hidden');
    return;
  }

  users.push({ name: name, email: email, password: pwd });
  localStorage.setItem('sb_users', JSON.stringify(users));
  localStorage.setItem('sb_just_registered', '1');
  window.location.href = 'preview-login.html';
}
</script>

</body>
</html>
